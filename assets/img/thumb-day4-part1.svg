<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Day 4 - Template Literals and Truthy/Falsy Values, Part 1">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7df1e"/>
      <stop offset=".5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glowL" cx="12%" cy="-5%" r="55%">
      <stop offset="0" stop-color="#f7df1e" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f7df1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="96%" cy="2%" r="55%">
      <stop offset="0" stop-color="#818cf8" stop-opacity=".24"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="#0a0e14"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glowL)"/>
  <rect width="1280" height="720" fill="url(#glowR)"/>

  <text x="96" y="150" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="26" letter-spacing="7" font-weight="700" fill="#22d3ee">DAY 4 · LEARN WITH PALLA</text>

  <text x="92" y="285" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="72" font-weight="800" fill="#e6edf3">Template Literals</text>
  <text x="96" y="390" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="84" font-weight="800" fill="url(#grad)">Truthy &amp; Falsy</text>

  <rect x="96" y="436" rx="14" width="196" height="60" fill="#22d3ee" fill-opacity=".14" stroke="#22d3ee" stroke-opacity=".55" stroke-width="1.5"/>
  <text x="128" y="476" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" font-weight="700" fill="#22d3ee">PART 1</text>

  <text x="96" y="560" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#569cd6">const</tspan> <tspan fill="#9cdcfe">msg</tspan> = <tspan fill="#ce9178">`Hi ${</tspan><tspan fill="#9cdcfe">name</tspan><tspan fill="#ce9178">}`</tspan>;</text>
  <text x="96" y="600" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#c586c0">if</tspan> (<tspan fill="#9cdcfe">msg</tspan>) greet(); <tspan fill="#6a9955">// truthy</tspan></text>

  <text x="96" y="670" font-family="'JetBrains Mono',Consolas,monospace" font-size="24" fill="#7e8da2">&lt;/&gt; learnwithpalla.com</text>

  <!-- Diagram: if (value) sorts values into truthy vs falsy columns -->
  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle">
    <!-- connector lines -->
    <g stroke-width="2.5" fill="none" stroke-opacity=".65">
      <path d="M986 192 L 862 248" stroke="#34d399"/>
      <path d="M986 192 L 1116 248" stroke="#e06c75"/>
    </g>

    <!-- hub -->
    <rect x="874" y="128" rx="16" width="224" height="62" fill="#f7df1e"/>
    <text x="986" y="170" font-size="30" font-weight="700" fill="#0a0e14">if (value)</text>

    <!-- truthy column -->
    <rect x="768" y="250" rx="17" width="188" height="56" fill="#34d399" fill-opacity=".16" stroke="#34d399" stroke-width="1.8"/>
    <text x="862" y="287" font-size="27" font-weight="700" fill="#34d399">truthy ✓</text>

    <g font-size="24" font-weight="700" fill="#b5cea8">
      <rect x="787" y="330" rx="14" width="150" height="48" fill="#34d399" fill-opacity=".09" stroke="#34d399" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="862" y="362">"hi"</text>
      <rect x="787" y="396" rx="14" width="150" height="48" fill="#34d399" fill-opacity=".09" stroke="#34d399" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="862" y="428">42</text>
      <rect x="787" y="462" rx="14" width="150" height="48" fill="#34d399" fill-opacity=".09" stroke="#34d399" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="862" y="494">[ ]</text>
      <rect x="787" y="528" rx="14" width="150" height="48" fill="#34d399" fill-opacity=".09" stroke="#34d399" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="862" y="560">{ }</text>
    </g>

    <!-- falsy column -->
    <rect x="1022" y="250" rx="17" width="188" height="56" fill="#e06c75" fill-opacity=".16" stroke="#e06c75" stroke-width="1.8"/>
    <text x="1116" y="287" font-size="27" font-weight="700" fill="#e06c75">falsy ✗</text>

    <g font-size="24" font-weight="700" fill="#e06c75">
      <rect x="1031" y="325" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="357">false</text>
      <rect x="1031" y="385" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="417">0</text>
      <rect x="1031" y="445" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="477">""</text>
      <rect x="1031" y="505" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="537">null</text>
      <rect x="1031" y="565" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="597">undefined</text>
      <rect x="1031" y="625" rx="14" width="170" height="48" fill="#e06c75" fill-opacity=".09" stroke="#e06c75" stroke-opacity=".5" stroke-width="1.4"/>
      <text x="1116" y="657">NaN</text>
    </g>
  </g>
</svg>
