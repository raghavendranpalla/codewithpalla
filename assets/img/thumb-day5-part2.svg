<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Day 5 - Numeric expressions with null and undefined, Part 2">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7df1e"/>
      <stop offset=".5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glowL" cx="12%" cy="-5%" r="55%">
      <stop offset="0" stop-color="#f7df1e" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f7df1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="96%" cy="2%" r="55%">
      <stop offset="0" stop-color="#818cf8" stop-opacity=".24"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#e06c75"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#0a0e14"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glowL)"/>
  <rect width="1280" height="720" fill="url(#glowR)"/>

  <text x="96" y="150" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="26" letter-spacing="7" font-weight="700" fill="#22d3ee">DAY 5 · LEARN WITH PALLA</text>

  <text x="92" y="285" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="66" font-weight="800" fill="#e6edf3">Maths with</text>
  <text x="96" y="390" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="80" font-weight="800" fill="url(#grad)">null &amp; undefined</text>

  <rect x="96" y="436" rx="14" width="196" height="60" fill="#22d3ee" fill-opacity=".14" stroke="#22d3ee" stroke-opacity=".55" stroke-width="1.5"/>
  <text x="128" y="476" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" font-weight="700" fill="#22d3ee">PART 2</text>

  <text x="96" y="560" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#b5cea8">10</tspan> + <tspan fill="#569cd6">null</tspan>       <tspan fill="#6a9955">// 10</tspan></text>
  <text x="96" y="600" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#b5cea8">10</tspan> + <tspan fill="#569cd6">undefined</tspan>  <tspan fill="#6a9955">// NaN</tspan></text>

  <text x="96" y="670" font-family="'JetBrains Mono',Consolas,monospace" font-size="24" fill="#7e8da2">&lt;/&gt; learnwithpalla.com</text>

  <!-- Diagram: 10 + x splits into the null path (0 → 10) and undefined path (NaN) -->
  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle">
    <!-- connector lines -->
    <g stroke-width="2.5" fill="none" stroke-opacity=".7">
      <path d="M986 192 L 866 244" stroke="#34d399" marker-end="url(#arrG)"/>
      <path d="M986 192 L 1112 244" stroke="#e06c75" marker-end="url(#arrR)"/>
    </g>

    <!-- hub -->
    <rect x="880" y="128" rx="16" width="212" height="62" fill="#f7df1e"/>
    <text x="986" y="170" font-size="30" font-weight="700" fill="#0a0e14">10 + x</text>

    <!-- null path -->
    <rect x="772" y="252" rx="17" width="188" height="58" fill="#569cd6" fill-opacity=".16" stroke="#569cd6" stroke-width="1.8"/>
    <text x="866" y="290" font-size="27" font-weight="700" fill="#569cd6">x = null</text>

    <path d="M866 310 L866 352" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>
    <text x="770" y="340" font-size="19" fill="#34d399">becomes</text>

    <rect x="791" y="360" rx="14" width="150" height="52" fill="#34d399" fill-opacity=".10" stroke="#34d399" stroke-opacity=".55" stroke-width="1.5"/>
    <text x="866" y="395" font-size="26" font-weight="700" fill="#34d399">0</text>

    <path d="M866 412 L866 454" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrG)"/>

    <rect x="775" y="462" rx="16" width="182" height="62" fill="#34d399"/>
    <text x="866" y="504" font-size="30" font-weight="800" fill="#0a0e14">10 ✓</text>

    <!-- undefined path -->
    <rect x="1000" y="252" rx="17" width="224" height="58" fill="#c678dd" fill-opacity=".16" stroke="#c678dd" stroke-width="1.8"/>
    <text x="1112" y="290" font-size="25" font-weight="700" fill="#c678dd">x = undefined</text>

    <path d="M1112 310 L1112 352" stroke="#e06c75" stroke-width="2.5" fill="none" marker-end="url(#arrR)"/>
    <text x="1214" y="340" font-size="19" fill="#e06c75">becomes</text>

    <rect x="1037" y="360" rx="14" width="150" height="52" fill="#e06c75" fill-opacity=".10" stroke="#e06c75" stroke-opacity=".55" stroke-width="1.5"/>
    <text x="1112" y="395" font-size="26" font-weight="700" fill="#e06c75">NaN</text>

    <path d="M1112 412 L1112 454" stroke="#e06c75" stroke-width="2.5" fill="none" marker-end="url(#arrR)"/>

    <rect x="1021" y="462" rx="16" width="182" height="62" fill="#e06c75"/>
    <text x="1112" y="504" font-size="30" font-weight="800" fill="#0a0e14">NaN ✗</text>

    <!-- takeaway -->
    <rect x="812" y="576" rx="14" width="348" height="78" fill="#22d3ee" fill-opacity=".08" stroke="#22d3ee" stroke-opacity=".5" stroke-width="1.6"/>
    <text x="986" y="608" font-size="21" font-weight="700" fill="#22d3ee">null → 0</text>
    <text x="986" y="638" font-size="21" fill="#22d3ee">undefined → NaN</text>
  </g>
</svg>
