<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" role="img" aria-label="Day 5 - Type Conversion in JavaScript, Part 1">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7df1e"/>
      <stop offset=".5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glowL" cx="12%" cy="-5%" r="55%">
      <stop offset="0" stop-color="#f7df1e" stop-opacity=".18"/>
      <stop offset="1" stop-color="#f7df1e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="96%" cy="2%" r="55%">
      <stop offset="0" stop-color="#818cf8" stop-opacity=".24"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".035" stroke-width="1"/>
    </pattern>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#0a0e14"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <rect width="1280" height="720" fill="url(#glowL)"/>
  <rect width="1280" height="720" fill="url(#glowR)"/>

  <text x="96" y="150" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="26" letter-spacing="7" font-weight="700" fill="#22d3ee">DAY 5 · LEARN WITH PALLA</text>

  <text x="92" y="285" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="72" font-weight="800" fill="#e6edf3">JavaScript</text>
  <text x="96" y="390" font-family="'Segoe UI',Inter,Arial,sans-serif" font-size="84" font-weight="800" fill="url(#grad)">Type Conversion</text>

  <rect x="96" y="436" rx="14" width="196" height="60" fill="#22d3ee" fill-opacity=".14" stroke="#22d3ee" stroke-opacity=".55" stroke-width="1.5"/>
  <text x="128" y="476" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" font-weight="700" fill="#22d3ee">PART 1</text>

  <text x="96" y="560" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#9cdcfe">Number</tspan>(<tspan fill="#ce9178">"45"</tspan>)   <tspan fill="#6a9955">// 45</tspan></text>
  <text x="96" y="600" font-family="'JetBrains Mono',Consolas,monospace" font-size="30" fill="#7e8da2"><tspan fill="#9cdcfe">String</tspan>(<tspan fill="#b5cea8">45</tspan>)     <tspan fill="#6a9955">// "45"</tspan></text>

  <text x="96" y="670" font-family="'JetBrains Mono',Consolas,monospace" font-size="24" fill="#7e8da2">&lt;/&gt; learnwithpalla.com</text>

  <!-- Diagram: one value converted across the three core types -->
  <g font-family="'JetBrains Mono',Consolas,monospace" text-anchor="middle">
    <!-- hub -->
    <rect x="874" y="120" rx="16" width="224" height="62" fill="#f7df1e"/>
    <text x="986" y="162" font-size="30" font-weight="700" fill="#0a0e14">convert( )</text>

    <!-- string box -->
    <rect x="886" y="226" rx="17" width="200" height="66" fill="#e5c07b" fill-opacity=".14" stroke="#e5c07b" stroke-width="2"/>
    <text x="986" y="262" font-size="28" font-weight="700" fill="#e5c07b">"45"</text>
    <text x="986" y="284" font-size="17" fill="#e5c07b" fill-opacity=".8">string</text>

    <!-- arrow down with label -->
    <path d="M986 296 L986 340" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
    <text x="1120" y="326" font-size="20" fill="#22d3ee">Number("45")</text>

    <!-- number box -->
    <rect x="886" y="348" rx="17" width="200" height="66" fill="#61afef" fill-opacity=".14" stroke="#61afef" stroke-width="2"/>
    <text x="986" y="384" font-size="28" font-weight="700" fill="#61afef">45</text>
    <text x="986" y="406" font-size="17" fill="#61afef" fill-opacity=".8">number</text>

    <!-- arrow down with label -->
    <path d="M986 418 L986 462" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
    <text x="1114" y="448" font-size="20" fill="#22d3ee">Boolean(45)</text>

    <!-- boolean box -->
    <rect x="886" y="470" rx="17" width="200" height="66" fill="#34d399" fill-opacity=".14" stroke="#34d399" stroke-width="2"/>
    <text x="986" y="506" font-size="28" font-weight="700" fill="#34d399">true</text>
    <text x="986" y="528" font-size="17" fill="#34d399" fill-opacity=".8">boolean</text>

    <!-- implicit conversion note -->
    <rect x="836" y="576" rx="14" width="300" height="78" fill="#c678dd" fill-opacity=".10" stroke="#c678dd" stroke-opacity=".55" stroke-width="1.6"/>
    <text x="986" y="608" font-size="21" font-weight="700" fill="#c678dd">implicit too:</text>
    <text x="986" y="638" font-size="21" fill="#c678dd">"45" * 1  →  45</text>
  </g>
</svg>
